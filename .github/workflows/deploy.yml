name: Deploy GLM to Hostinger

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            cd /home/${{ secrets.SSH_USER }}/domains/glm.marfoussiwebart.com/public_html

            git fetch origin main
            git reset --hard origin/main

            composer install --no-dev --optimize-autoloader

            php artisan migrate --force || true
            php artisan storage:link || true

            php artisan optimize:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            chmod -R 775 storage bootstrap/cache

            echo "--- Verifying build ---"
            ls -la public/build/ || (echo "WARN: public/build/ not found – run npm run build locally and commit public/build before pushing" && exit 1)
            test -f public/build/manifest.json || (echo "WARN: manifest.json missing" && exit 1)
            echo "Build OK ✅"
