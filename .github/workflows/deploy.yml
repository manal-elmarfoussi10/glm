name: Deploy GLM to Hostinger

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ✅ MUST be here (top), not inside SSH script
      - name: Stop if commit contains [skip ci]
        if: contains(github.event.head_commit.message, '[skip ci]')
        run: exit 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install and build assets
        run: |
          npm ci
          npm run build

      - name: Commit and push build
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f public/build
          git diff --staged --quiet || git commit -m "chore: build assets for production [skip ci]"
          git push

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            cd /home/${{ secrets.SSH_USER }}/domains/glm.marfoussiwebart.com/public_html

            git reset --hard
            git clean -fd
            git fetch origin main
            git reset --hard origin/main

            composer install --no-dev --optimize-autoloader

            php artisan migrate --force || true
            php artisan storage:link || true

            php artisan optimize:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            chmod -R 775 storage bootstrap/cache

            echo "--- Verifying build ---"
            ls -la public/build/ || (echo "ERROR: public/build/ not found" && exit 1)
            test -f public/build/manifest.json || (echo "ERROR: manifest.json missing" && exit 1)
            echo "Build OK ✅"