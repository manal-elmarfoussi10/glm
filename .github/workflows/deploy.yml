name: Deploy GLM to Hostinger

on:
  push:
    branches: ["main"]

env:
  DEPLOY_ROOT: /home/${{ secrets.SSH_USER }}/domains/glm.marfoussiwebart.com/public_html

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to push build commit
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install and build assets
        run: |
          npm ci
          npm run build

      # Commit build and push - server gets it via git pull (avoids SCP, which
      # fails on shared hosting due to .bashrc/fnm permission issues)
      - name: Commit and push build
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f public/build
          git diff --staged --quiet || git commit -m "chore: build assets for production [skip ci]"
          git push

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            cd ${{ env.DEPLOY_ROOT }}

            git pull origin main

            composer install --no-dev --optimize-autoloader

            php artisan migrate --force
            php artisan storage:link || true
            php artisan optimize:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            chmod -R 775 storage bootstrap/cache

            echo "--- Verifying build ---"
            ls -la public/build/ || (echo "ERROR: public/build/ not found" && exit 1)
            test -f public/build/manifest.json || (echo "ERROR: manifest.json missing" && exit 1)
            echo "Build OK"
